<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestor de Colección | Tu Dominio</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>Nicolasse 🌸</h1>
      <p class="subtitle">Decora tu casa con estilo</p>
      <div class="stats-summary" id="stats-summary">
        <span class="stat">Total: <strong id="stat-total">0</strong></span>
        <span class="stat">Activos: <strong id="stat-active">0</strong></span>
        <span class="stat">Inactivos: <strong id="stat-inactive">0</strong></span>
      </div>
    </header>

    <!-- Item Form -->
    <section class="form-section">
      <h2 id="form-title">✨Nuevo producto</h2>
      <form id="item-form" class="item-form">
        <input type="hidden" id="item-id" value="">

        <div class="form-group">
          <label for="item-name">Nombre *</label>
          <input type="text" id="item-name" placeholder="Nombre del producto" required>
        </div>

        <div class="form-group">
          <label for="item-description">Descripción</label>
          <textarea id="item-description" rows="3" placeholder="Detalles adicionales (opcional)"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="item-category">Categoría</label>
            <select id="item-category">
              <option value="dormitorio">🛏️ Dormitorio</option>
              <option value="sala">🛋️ Sala</option>
              <option value="comedor">🍽️ Comedor</option>
              <option value="baño">🛁 Baño</option>
            </select>
          </div>

          <div class="form-group">
            <label for="item-priority">Prioridad/Nivel</label>
            <select id="item-priority">
              <option value="low">🟢 Baja</option>
              <option value="medium" selected>🟡 Media</option>
              <option value="high">🔴 Alta</option>
            </select>
          </div>
        </div>

        <!-- Campos adicionales -->
        <div class="form-group">
          <label for="item-dimension">Dimensión (cm)</label>
          <input type="number" id="item-dimension" placeholder="Ej: 120">
        </div>

        <div class="form-group">
          <label for="item-material">Material</label>
          <input type="text" id="item-material" placeholder="Ej: Madera">
        </div>

        <div class="form-group">
          <label for="item-color">Color</label>
          <input type="text" id="item-color" placeholder="Ej: Azul">
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submit-btn">Crear</button>
          <button type="button" class="btn btn-secondary" id="cancel-btn" style="display: none;">Cancelar</button>
        </div>
      </form>
    </section>

    <!-- Filters & Search -->
    <section class="filters-section">
      <div class="filters">
        <div class="filter-group">
          <label for="filter-status">Estado:</label>
          <select id="filter-status">
            <option value="all">Todos</option>
            <option value="active">Activos</option>
            <option value="inactive">Inactivos</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="filter-category">Categoría:</label>
          <select id="filter-category">
            <option value="all">Todas</option>
            <option value="dormitorio">Dormitorio</option>
            <option value="sala">Sala</option>
            <option value="comedor">Comedor</option>
            <option value="baño">Baño</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="filter-priority">Prioridad:</label>
          <select id="filter-priority">
            <option value="all">Todas</option>
            <option value="high">Alta</option>
            <option value="medium">Media</option>
            <option value="low">Baja</option>
          </select>
        </div>

        <div class="filter-group search-group">
          <label for="search-input">Buscar:</label>
          <input type="text" id="search-input" placeholder="Buscar productos...">
        </div>
      </div>
    </section>

    <!-- Item List -->
    <section class="items-section">
      <div class="items-header">
        <h2>📝 Catálogo</h2>
        <button class="btn btn-outline" id="clear-inactive">🗑️ Limpiar Inactivos</button>
      </div>

      <div id="item-list" class="item-list">
        <!-- Los elementos se renderizarán aquí con JavaScript -->
      </div>

      <div id="empty-state" class="empty-state">
        <p>📭 No hay productos que mostrar</p>
        <p class="empty-state-hint">Crea tu primer producto usando el formulario arriba</p>
      </div>
    </section>

    <!-- Detailed Stats -->
    <section class="detailed-stats">
      <h3>📊 Estadísticas Detalladas</h3>
      <div id="stats-details" class="stats-grid">
        <!-- Las estadísticas se renderizarán aquí con JavaScript -->
      </div>
    </section>
  </div>

  <!-- Script principal -->
  <script src="starter/script.js"></script>
</body>
</html>
